server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the Quarkus backend.
    # Lighttpd forwards /matchwiz/api/... here; nginx strips the prefix and
    # proxies to the backend container — same-origin from the browser's perspective.
    location /matchwiz/api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Angular SPA under /matchwiz/ — fall back to index.html for client-side routing.
    location /matchwiz/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /matchwiz/index.html;
    }

    # Redirect bare root to the app.
    location = / {
        return 301 /matchwiz/;
    }

    # Security headers
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         SAMEORIGIN;
    add_header X-XSS-Protection        "1; mode=block";

    # Cache static assets aggressively; index.html never cached.
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|webp|jpg|jpeg|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location = /matchwiz/index.html {
        add_header Cache-Control "no-store";
    }
}
